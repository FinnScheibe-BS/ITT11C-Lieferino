# Eigener Projektname, damit es NICHT mit anderen Docker-Projekten kollidiert.
name: lieferino

services:
  db:
    image: postgres:16-alpine
    container_name: lieferino-db
    environment:
      POSTGRES_USER: lieferino
      POSTGRES_PASSWORD: lieferino
      POSTGRES_DB: lieferino
    # Bewusst KEIN "ports:" – die DB ist nur intern erreichbar (kein Port-Konflikt).
    volumes:
      - lieferino_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lieferino"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: lieferino-backend
    environment:
      PORT: "8080"
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: lieferino
      DB_PASSWORD: lieferino
      DB_NAME: lieferino
      JWT_SECRET: "dev-secret-bitte-aendern"
      # Für echten E-Mail-Versand hier ein Gmail-App-Passwort eintragen (sonst Test-Modus):
      GMAIL_USER: ""
      GMAIL_APP_PASSWORD: ""
    ports:
      # Host-Port 8090 -> Container-Port 8080 (8090 statt 8080, um Konflikte zu vermeiden).
      - "8090:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  lieferino_pgdata:
